<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#edf4f3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>仙台・河口湖旅遊小工具</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <style>
    :root{
      --bg:#f7f7f3;--surface:#ffffff;--text:#1e293b;--muted:#64748b;--line:#e5e7eb;
      --primary:#7ca6a1;--blue:#dfeefb;--orange:#f8e7cf;--purple:#ece6fb;--green:#e5f2e7;--red:#fae1e1;--yellow:#f5f0d7;
      --shadow:0 10px 25px rgba(15,23,42,.06);--radius:22px;
      --safe-bottom:max(18px, env(safe-area-inset-bottom));
    }
    *{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif}
    body{max-width:430px;margin:0 auto;min-height:100vh}
    .app{padding:18px 16px calc(84px + var(--safe-bottom));}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin:6px 0 16px}
    .title{font-size:28px;font-weight:800;letter-spacing:.2px}
    .sub{color:var(--muted);font-size:14px;margin-top:6px}
    .chiprow{display:flex;gap:8px;overflow:auto;padding-bottom:6px;margin:10px 0 16px}
    .chip{padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:13px;white-space:nowrap}
    .chip.active{background:var(--text);color:#fff;border-color:var(--text)}
    .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;border:1px solid rgba(0,0,0,.03)}
    .hero{background:linear-gradient(180deg,#eef7f6 0%,#fff 100%)}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .kicker{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
    .big{font-size:22px;font-weight:800}
    .weather{display:flex;align-items:center;gap:10px;background:var(--blue);border-radius:18px;padding:12px 14px;margin-top:12px}
    .icon{width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;font-size:20px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
    .quick button,.action,.ghost{border:none;background:#fff;border-radius:18px;padding:12px 10px;box-shadow:var(--shadow);font:inherit;color:var(--text)}
    .quick button{display:flex;flex-direction:column;align-items:center;gap:8px;font-size:12px}
    .section-title{font-size:18px;font-weight:800;margin:8px 0 12px}
    .timeline{display:flex;flex-direction:column;gap:12px}
    .item{display:grid;grid-template-columns:52px 1fr;gap:12px;align-items:start}
    .time{font-size:13px;color:var(--muted);padding-top:8px}
    .mini{padding:14px;border-radius:20px;border:1px solid rgba(0,0,0,.04)}
    .spot{background:var(--blue)} .food{background:var(--orange)} .transport{background:#eef3f8} .hotel{background:var(--purple)} .guide{background:var(--yellow)} .alert{background:var(--green)} .danger{background:var(--red)}
    .mini h4{margin:0 0 6px;font-size:16px} .mini p{margin:0;color:#334155;line-height:1.45;font-size:14px}
    .tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .tag{font-size:12px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.7);font-weight:700}
    .btnrow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .action{background:rgba(255,255,255,.82);padding:10px 12px;border:1px solid rgba(0,0,0,.06);font-size:13px}
    .hidden{display:none!important}
    .nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(430px,100vw);background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line);padding:10px 14px calc(10px + var(--safe-bottom));display:grid;grid-template-columns:repeat(5,1fr);z-index:20}
    .nav button{border:none;background:transparent;font:inherit;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11px;padding:4px}
    .nav button.active{color:var(--text);font-weight:700}
    .small{font-size:12px;color:var(--muted)}
    .list{display:flex;flex-direction:column;gap:10px}
    .kv{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px dashed var(--line)}
    .kv:last-child{border-bottom:none}
    .input, select{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;font:inherit}
    .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .primary{background:var(--text)!important;color:#fff!important}
    .budget-total{font-size:28px;font-weight:800}
    .notice{font-size:12px;color:var(--muted);line-height:1.5}
    a{text-decoration:none;color:inherit}
  </style>
</head>
<body>
  <div class="app">
    <section id="view-home"></section>
    <section id="view-itinerary" class="hidden"></section>
    <section id="view-bookings" class="hidden"></section>
    <section id="view-budget" class="hidden"></section>
    <section id="view-more" class="hidden"></section>

  <nav class="nav">
    <button data-tab="home" class="active"><span>🏠</span><span>首頁</span></button>
    <button data-tab="itinerary"><span>🗓️</span><span>行程</span></button>

    <button data-tab="budget"><span>💴</span><span>記帳</span></button>

function cardClass(type){ return {spot:'spot',food:'food',transport:'transport',hotel:'hotel',guide:'guide',alert:'alert',danger:'danger'}[type] || 'guide'; }
function navBtn(place){ if(!place || !places[place]) return ''; return `<a class="action" href="${places[place]}" target="_blank" rel="noopener">🧭 導航</a>`; }
function copyBtn(text){ return `<button class="action" onclick="navigator.clipboard.writeText('${(text||'').replace(/'/g,"\\'")}')">📋 複製</button>`; }

      <div><div class="title">每日行程</div><div class="sub">手機優先時間線</div></div>
    </div>
    <div class="chiprow">${trip.days.map((d,i)=>`<button class="chip ${i===selected?'active':''}" onclick="renderItinerary(${i})">${d.date}</button>`).join('')}</div>
    <div class="card hero">
      <div class="row"><div><div class="big">${day.city}</div><div class="sub">${day.theme}</div></div></div>
      <div class="weather"><div class="icon">${day.weather.icon}</div><div><div><strong>${day.weather.text}</strong> ${day.weather.temp ? '・ ' + day.weather.temp : ''}</div><div class="small">降雨機率 ${day.weather.rain || '—'}</div></div></div>
    </div>
    <div class="timeline">
      ${day.cards.map(c=>`
        <div class="item">
          <div class="time">${c.time}</div>
          <div class="mini ${cardClass(c.type)}">
            <h4>${c.title}</h4>
            ${c.place ? `<div class="small" style="margin-bottom:6px">📍 ${c.place}</div>`:''}
            <p>${c.body}</p>
            ${c.tags ? `<div class="tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
            <div class="btnrow">${navBtn(c.place)}${c.place?copyBtn(c.place):''}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderBookings(){
  document.getElementById('view-bookings').innerHTML = `
    <div class="topbar"><div><div class="title">預訂資料</div><div class="sub">航班、住宿、預約代號</div></div></div>
    <div class="section-title">航班</div>
    ${trip.flights.map(f=>`
      <div class="card ${f.type==='去程'?'transport':'transport'}">
        <div class="row"><div><div class="small">${f.type}</div><div class="big">${f.no}</div></div><div class="tag">${f.bookingCode}</div></div>
        <div class="kv"><span>${f.from}</span><strong>${new Date(f.fromTime).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit',hour12:false})}</strong></div>
        <div class="kv"><span>${f.to}</span><strong>${new Date(f.toTime).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit',hour12:false})}</strong></div>
        <div class="btnrow">${copyBtn(f.bookingCode)}</div>
      </div>`).join('')}
    <div class="section-title">住宿</div>
    ${trip.hotels.map(h=>`
      <div class="card hotel">
        <h3 style="margin:0 0 6px">${h.name}</h3>
        <div class="small">📍 ${h.city}</div>
        <div class="kv"><span>入住</span><strong>${h.checkIn}</strong></div>
        <div class="kv"><span>退房</span><strong>${h.checkOut}</strong></div>
        <div class="small">${h.note||''}</div>
        <div class="btnrow">${navBtn(h.name)}${copyBtn(h.name)}</div>
      </div>`).join('')}
  `;
}

function renderBudget(){
  const entries = getBudget();
  const total = entries.reduce((a,b)=>a+Number(b.amount||0),0);
  document.getElementById('view-budget').innerHTML = `
    <div class="topbar"><div><div class="title">記帳 / 預算</div><div class="sub">離線儲存於此裝置</div></div></div>
    <div class="card hero"><div class="small">目前總開支</div><div class="budget-total">${fmtMoney(total)}</div><div class="notice">這是離線版，資料會儲存在你的瀏覽器 localStorage。之後可改成 Firebase 同步。</div></div>
    <div class="card">
      <div class="section-title" style="margin-top:0">新增支出</div>
      <div class="formgrid">
        <input id="b-date" class="input" type="date" value="2026-04-04" />
        <select id="b-cat"><option>交通</option><option>飲食</option><option>購物</option><option>住宿</option><option>門票</option><option>其他</option></select>
      </div>
      <div class="formgrid" style="margin-top:10px">
        <input id="b-amount" class="input" type="number" placeholder="金額 JPY" />
        <input id="b-note" class="input" placeholder="備註" />
      </div>
      <div class="btnrow"><button class="action primary" onclick="addBudget()">＋ 新增</button><button class="action" onclick="clearBudget()">清空資料</button></div>
    </div>
    <div class="section-title">支出列表</div>
    <div class="list">
      ${entries.length? entries.slice().reverse().map((e,idx)=>`<div class="card"><div class="row"><strong>${e.category}</strong><strong>${fmtMoney(Number(e.amount))}</strong></div><div class="small">${e.date} ・ ${e.note||'—'}</div></div>`).join('') : `<div class="card"><div class="small">還未有支出。你可以直接在旅途中新增。</div></div>`}
    </div>
  `;
}

function addBudget(){
  const date=document.getElementById('b-date').value;
  const category=document.getElementById('b-cat').value;
  const amount=document.getElementById('b-amount').value;
  const note=document.getElementById('b-note').value;
  if(!amount){ alert('請輸入金額'); return; }
  const data=getBudget();
  data.push({date,category,amount:Number(amount),note});
  setBudget(data); renderBudget();
}
function clearBudget(){ if(confirm('確定清空所有記帳資料？')){ localStorage.removeItem('travelBudget'); renderBudget(); } }

function renderMore(){
  document.getElementById('view-more').innerHTML = `
    <div class="topbar"><div><div class="title">更多工具</div><div class="sub">緊急聯絡、部署、說明</div></div></div>
    <div class="section-title">緊急聯絡</div>
    <div class="card danger">${trip.emergency.map(e=>`<div class="kv"><span>${e[0]}</span><strong>${e[1]}</strong></div>`).join('')}</div>
    <div class="section-title">常用提醒</div>
    <div class="card guide">
      <div class="tags"><span class="tag">必吃美食</span><span class="tag">必買伴手禮</span><span class="tag">重要預約代號</span><span class="tag">交通提醒</span></div>
      <p style="margin-top:10px">這個 App 已內建你的預訂與完整日程。若要上線成正式 PWA，直接把整個資料夾丟上 GitHub，再部署到 Vercel / Netlify / Kinsta 靜態站都可以。</p>
    </div>
    <div class="section-title">部署說明</div>
    <div class="card"><div class="notice">1. 上傳本資料夾到 GitHub。<br>2. 用 Vercel / Netlify 連 repo。<br>3. 這版是純靜態 PWA，不需要資料庫。<br>4. 若你之後想把記帳跨裝置同步，再接 Firebase。</div></div>
  `;
}

function switchTab(tab){
  ['home','itinerary','bookings','budget','more'].forEach(id=>{
    document.getElementById('view-'+id).classList.toggle('hidden', id!==tab);
    document.querySelector(`[data-tab="${id}"]`).classList.toggle('active', id===tab);
  });
  if(tab==='itinerary') renderItinerary(1);
  if(tab==='bookings') renderBookings();
  if(tab==='budget') renderBudget();
  if(tab==='more') renderMore();
}

document.querySelectorAll('.nav button').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));
renderHome(); renderItinerary(1); renderBookings(); renderBudget(); renderMore();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}
  </script>
</body>
</html>
